<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>지역어종합정보 — 로그인</title>
<link rel="shortcut icon" href="./favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="./styles.css">
<script src="./gnb.js" defer></script>
<script src="./footer.js" defer></script>
<style>
  body {
    background: #f1f5f9;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
  }

  /* 로그인 페이지 중앙 배치 컨테이너 */
  .login-container {
    max-width: 520px;
    width: 100%;
    margin: 0 auto;
    padding: 60px 20px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }

  .login-card {
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 50px 40px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    text-align: center;
    width: 100%;
    box-sizing: border-box;
  }

  .login-title {
    font-size: 28px;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 35px;
    letter-spacing: -0.03em;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .login-input {
    width: 100%;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    background: #ffffff;
    color: var(--text);
    outline: none;
    transition: 0.2s;
    box-sizing: border-box;
  }

  .login-input:focus {
    border-color: #64748b;
    box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.15);
  }

  .login-submit-btn {
    width: 100%;
    background: #404040;
    color: #ffffff;
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
  }

  .login-submit-btn:hover {
    background: #2d2d2d;
  }

  .login-links {
    margin-top: 24px;
    font-size: 13px;
    color: #64748b;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .login-link {
    color: #64748b;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .login-link:hover {
    color: #1e293b;
  }

  .login-divider {
    color: #cbd5e1;
  }

  /* 소셜 로그인 구분선 */
  .social-divider-row {
    display: flex;
    align-items: center;
    margin: 35px 0 25px;
  }

  .social-divider-line {
    flex: 1;
    height: 1px;
    background: #e2e8f0;
  }

  .social-divider-text {
    padding: 0 15px;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 600;
  }

  /* 소셜 버튼 */
  .social-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .social-btn {
    width: 100%;
    height: 52px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .social-btn:hover {
    opacity: 0.9;
  }

  .social-btn--kakao {
    background: #FFE812;
    color: #3C1E1E;
  }

  .social-btn--naver {
    background: #03C75A;
    color: #ffffff;
  }

  .social-icon-kakao {
    font-size: 18px;
    color: #3C1E1E;
  }

  .social-icon-naver {
    font-size: 16px;
    font-weight: 900;
    font-family: Arial, sans-serif;
    display: inline-block;
    background: #ffffff;
    color: #03C75A;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 4px;
  }

  @media (max-width: 900px) {
    .nav { display: none; } /* 모바일에서는 간단히 히든처리 */
    .login-container {
      margin: 40px auto;
    }
    .login-card {
      padding: 35px 24px;
    }
  }
</style>
</head>
<body>

<div id="gnb-common"></div>

<div class="login-container">
  <div class="login-card">
    <h1 class="login-title">로그인</h1>
    
    <form class="login-form" onsubmit="event.preventDefault(); alert('로그인 시도');">
      <input type="text" class="login-input" placeholder="아이디 또는 이메일주소" required aria-label="아이디 또는 이메일주소">
      <input type="password" class="login-input" placeholder="비밀번호" required aria-label="비밀번호">
      <button type="submit" class="login-submit-btn">로그인</button>
    </form>

    <div class="login-links">
      <a href="./register.html" class="login-link">회원가입</a>
      <span class="login-divider">|</span>
      <a href="#" class="login-link">로그인 정보 찾기</a>
    </div>

    <div class="social-divider-row">
      <div class="social-divider-line"></div>
      <span class="social-divider-text">소셜미디어 계정으로 로그인</span>
      <div class="social-divider-line"></div>
    </div>

    <div class="social-buttons">
      <a href="#" class="social-btn social-btn--kakao" onclick="event.preventDefault(); alert('카카오 로그인 시도');">
        <i class="ti ti-message-circle-2-filled social-icon-kakao"></i>
        카카오 계정으로 로그인
      </a>
      <a href="#" class="social-btn social-btn--naver" onclick="event.preventDefault(); alert('네이버 로그인 시도');">
        <span class="social-icon-naver">N</span>
        네이버 계정으로 로그인
      </a>
    </div>
  </div>
</div>

<div id="footer-common"></div>

</body>
</html>
