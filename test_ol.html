<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OpenLayers 로드 테스트</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.9.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@v10.9.0/dist/ol.js"></script>
</head>
<body>
  <h1>OpenLayers 로드 테스트</h1>
  <div id="map" style="width: 100%; height: 400px;"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        console.log('=== Test Results ===');
        console.log('window.ol exists:', !!window.ol);
        console.log('ol.Map exists:', !!window.ol?.Map);
        console.log('ol.proj exists:', !!window.ol?.proj);
        console.log('ol.layer exists:', !!window.ol?.layer);
        console.log('ol.source exists:', !!window.ol?.source);
        console.log('ol.View exists:', !!window.ol?.View);

        if (window.ol && window.ol.Map) {
          try {
            const map = new ol.Map({
              target: 'map',
              layers: [
                new ol.layer.Tile({
                  source: new ol.source.OSM()
                })
              ],
              view: new ol.View({
                center: ol.proj.fromLonLat([127.0, 37.5]),
                zoom: 7
              })
            });
            console.log('✓ Map created successfully');
          } catch (e) {
            console.error('✗ Map creation failed:', e);
          }
        } else {
          console.error('✗ OpenLayers library not loaded properly');
        }
      }, 1000);
    });
  </script>
</body>
</html>
