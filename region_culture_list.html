function getItems(catId) {
  if (ITEMS[catId]) return ITEMS[catId];
  const c = CATEGORIES.find(x => x.id === catId);
  if (!c) return [];
  return [{ word: c.name, std: '', region: c.region + ' 일원', year: 2010, source: '민족생활어 조사 자료',
    img: c.img, theme: c.name, desc: c.desc + '. 관련 어휘의 상세 조사 자료는 준비 중입니다.' }];
}

// 쿼리 스트링 획득
const catId = new URLSearchParams(window.location.search).get('cat');
if (!catId) {
  location.href = './region_culture.html';
} else {
  const c = CATEGORIES.find(x => x.id === catId);
  if (c) {
    document.title = `${c.name} 어휘 목록 — 사진으로 보는 생활어`;
    document.getElementById('rcSubTitle').innerText = c.name;
    renderList(catId);
  } else {
    location.href = './region_culture.html';
  }
}

function renderList(catId) {
  const c = CATEGORIES.find(x => x.id === catId);
  const items = getItems(catId);
  document.getElementById('rcItemResult').innerHTML = `주제 <span class="rc-hl">${c.name}</span> 에 대한 검색 결과는 <b>${items.length}건</b>입니다.`;
  const grid = document.getElementById('rcItemGrid');
  grid.innerHTML = items.map((it, i) => `
    <div class="rc-item" role="button" tabindex="0" onclick="location.href='./region_culture_detail.html?cat=${catId}&idx=${i}'" aria-label="${it.word} 상세 보기">
      <div class="rc-item__media">
        <img class="rc-item__img" src="${IMG}${it.img}" alt="${it.word}">
      </div>
      <div class="rc-item__body">
        <div class="rc-item__head">
          <span class="rc-item__word">${it.word}</span>
        </div>
        <div class="rc-item__meta"><i class="ti ti-calendar-event" style="font-size:14px"></i>${it.year}년 조사 · ${it.region}</div>
        <p class="rc-item__desc">${it.desc}</p>
        <span class="rc-item__cta">상세 보기 <i class="ti ti-arrow-right"></i></span>
      </div>
    </div>`).join('');
}
</script>
